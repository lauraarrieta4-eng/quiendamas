<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmando cuenta — Quiéndamas</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f1f8e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 380px;
            width: 90%;
        }
        h2 { color: #2e7d32; margin-bottom: 10px; }
        p { color: #555; font-size: 0.95em; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size:3em;">⏳</div>
        <h2>Confirmando tu cuenta...</h2>
        <p>Por favor esperá un momento.</p>
    </div>

    <script>
        async function handleCallback() {
            const card = document.querySelector('.card');
            
            // Supabase maneja automáticamente el token del hash
            const { data, error } = await _supabase.auth.getSession();

            if (error || !data.session) {
                card.innerHTML = `
                    <div style="font-size:3em;">❌</div>
                    <h2 style="color:#c62828;">Error al confirmar</h2>
                    <p>El link expiró o no es válido. <a href="login.html" style="color:#2e7d32; font-weight:bold;">Volvé al login</a> y registrate de nuevo.</p>
                `;
                return;
            }

            // Confirmación exitosa
            card.innerHTML = `
                <div style="font-size:3em;">✅</div>
                <h2>¡Cuenta confirmada!</h2>
                <p>Tu cuenta fue verificada correctamente. Redirigiendo al login...</p>
            `;

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }

        handleCallback();
    </script>
</body>
</html>
