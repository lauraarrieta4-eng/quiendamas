<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago pendiente - Quiéndamas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #F5E1E2; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px 30px; text-align: center; max-width: 360px; width: 90%; box-shadow: 0 6px 24px rgba(224,72,145,0.15); border-top: 5px solid #f9a825; }
        .icono { font-size: 4rem; margin-bottom: 16px; }
        h1 { color: #f57f17; font-size: 1.4em; margin-bottom: 10px; }
        p { color: #555; font-size: 0.92em; line-height: 1.5; margin-bottom: 24px; }
        a { display: block; background: #E04891; color: white; border-radius: 10px; padding: 14px; font-weight: bold; text-decoration: none; font-size: 1em; }
        a:hover { opacity: 0.88; }
    </style>
</head>
<body>
<div class="card">
    <div class="icono">⏳</div>
    <h1>Pago pendiente</h1>
    <p>Tu pago está siendo procesado. Cuando se confirme, el vendedor recibirá una notificación y se pondrá en contacto con vos para coordinar la entrega.</p>
    <a href="vidriera.html">Volver a la vidriera</a>
</div>
</body>
</html>
