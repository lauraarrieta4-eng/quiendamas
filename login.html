<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Quiéndamas - Login</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f1f8e9; 
            display: flex; 
            justify-content: center; 
            padding: 15px; 
            margin: 0;
            min-height: 100vh;
            align-items: center; 
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box;
        }
        h2 { color: #2e7d32; text-align: center; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; color: #333; }
        
        .password-container {
            position: relative;
            width: 100%;
        }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        
        .password-container input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-3px);
            cursor: pointer;
            font-size: 1.2rem;
            user-select: none;
            color: #666;
        }
        
        button { 
            background-color: #43a047; 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 25px; 
            font-size: 1rem;
        }
        button:hover { background-color: #2e7d32; }
        .toggle { text-align: center; margin-top: 20px; font-size: 0.9em; color: #2e7d32; cursor: pointer; text-decoration: underline; font-weight: bold; }
        .recuperar-link { text-align: center; margin-top: 12px; font-size: 0.85em; color: #666; cursor: pointer; text-decoration: underline; display: block; }
        .recuperar-link:hover { color: #2e7d32; }
        .terminos { margin-top: 15px; font-size: 0.8em; color: #444; background: #f9f9f9; padding: 10px; border-radius: 5px; border: 1px solid #eee; }
        #mensaje { margin-top: 15px; text-align: center; font-size: 0.9em; font-weight: bold; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <div id="contenedor-principal">
            <h2 id="titulo">Ingresar</h2>
            
            <div id="campos-comunes">
                <label>Email:</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com">
                
                <label>Contraseña:</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="******">
                    <span class="toggle-password" onclick="alternarVisibilidadContrasena('password')">👁️</span>
                </div>
            </div>

            <div id="campos-registro" style="display: none;">
                <label>Nombre Completo:</label>
                <input type="text" id="nombre">
                <label>DNI:</label>
                <input type="text" id="dni">
                <label>Dirección (para envíos):</label>
                <input type="text" id="direccion">
                <label>Teléfono:</label>
                <input type="text" id="telefono">
                
                <div class="terminos">
                    <input type="checkbox" id="acepto_terminos" style="width: auto;"> 
                    Acepto los <a href="terminos.html" target="_blank" style="color:#2e7d32; font-weight:bold;">Términos y Conditions</a> de Quiéndamas.
                </div>
            </div>

            <button id="btn-principal" onclick="ejecutarAccion()">Entrar</button>
            <a id="link-recuperar" class="recuperar-link" onclick="recuperarContrasena()">¿Te olvidaste tu contraseña?</a>
            <div id="toggle-link" class="toggle" onclick="cambiarModo()">¿No tenés cuenta? Registrate aquí</div>
        </div>

        <div id="contenedor-recuperacion" style="display: none;">
            <h2>Nueva Contraseña</h2>
            <p style="text-align: center; color: #555; font-size: 0.9em;">Escribí tu nueva clave de acceso para Quiéndamas.</p>
            
            <label>Nueva Contraseña:</label>
            <div class="password-container">
                <input type="password" id="nueva-password" placeholder="Mínimo 6 caracteres">
                <span class="toggle-password" onclick="alternarVisibilidadContrasena('nueva-password')">👁️</span>
            </div>
            
            <button onclick="guardarNuevaContrasena()">Guardar y Entrar</button>
        </div>
        
        <div id="mensaje"></div>
    </div>

    <script>
        let esRegistro = false;

        // DETECTOR DE ENLACE DE RECUPERACIÓN (REVISIÓN DE TOKEN DE RECOVERY)
        window.addEventListener('DOMContentLoaded', () => {
            const URLActual = window.location.href;
            if (URLActual.includes('type=recovery') || window.location.hash.includes('type=recovery')) {
                document.getElementById('contenedor-principal').style.display = 'none';
                document.getElementById('contenedor-recuperacion').style.display = 'block';
            }
        });

        function cambiarModo() {
            esRegistro = !esRegistro;
            document.getElementById('titulo').innerText = esRegistro ? "Crear Cuenta" : "Ingresar";
            document.getElementById('btn-principal').innerText = esRegistro ? "Registrarse" : "Entrar";
            document.getElementById('campos-registro').style.display = esRegistro ? "block" : "none";
            document.getElementById('link-recuperar').style.display = esRegistro ? "none" : "block";
            document.getElementById('toggle-link').innerText = esRegistro ? "¿Ya tenés cuenta? Ingresá" : "¿No tenés cuenta? Registrate aquí";
            document.getElementById('mensaje').innerText = "";
        }

        function alternarVisibilidadContrasena(idInput) {
            const inputPass = document.getElementById(idInput);
            const iconoOjo = inputPass.nextElementSibling;
            if (inputPass.type === "password") {
                inputPass.type = "text";
                iconoOjo.innerText = "🔒";
            } else {
                inputPass.type = "password";
                iconoOjo.innerText = "👁️";
            }
        }

        // 🚨 FUNCIÓN CORREGIDA CON EL SISTEMA SEGURO DE OTP PARA ENLACES
        async function recuperarContrasena() {
            const email = document.getElementById('email').value;
            const msg = document.getElementById('mensaje');

            if (!email) {
                msg.style.color = "red";
                msg.innerText = "⚠️ Escribí primero tu Email en el casillero de arriba para enviarte el enlace.";
                return;
            }

            msg.style.color = "blue";
            msg.innerText = "⏳ Solicitando enlace a Supabase...";

            // Usamos signInWithOtp con la opción de redirección limpia para recuperación
            const { error } = await _supabase.auth.signInWithOtp({
                email: email,
                options: {
                    shouldCreateUser: false,
                    emailRedirectTo: 'https://lauraarrieta4-eng.github.io/quiendamas/login.html?type=recovery'
                }
            });

            if (error) {
                msg.style.color = "red";
                msg.innerText = "❌ " + error.message;
            } else {
                msg.style.color = "green";
                msg.innerHTML = `
                    <div style="text-align: center; margin-top: 15px; padding: 12px; background-color: #e3f2fd; border-radius: 8px; border: 1px solid #bbdefb;">
                        📧 <b>¡Solicitud enviada!</b><br>
                        Si el correo está registrado, te llegará un enlace para iniciar sesión y cambiar tu contraseña. Buscalo también en SPAM.
                    </div>
                `;
            }
        }

        async function guardarNuevaContrasena() {
            const nuevaPassword = document.getElementById('nueva-password').value;
            const msg = document.getElementById('mensaje');

            if (!nuevaPassword || nuevaPassword.length < 6) {
                msg.style.color = "red";
                msg.innerText = "⚠️ La contraseña debe tener al menos 6 caracteres.";
                return;
            }

            msg.style.color = "blue";
            msg.innerText = "⏳ Guardando nueva contraseña...";

            const { error } = await _supabase.auth.updateUser({ password: nuevaPassword });

            if (error) {
                msg.style.color = "red";
                msg.innerText = "❌ " + error.message;
            } else {
                msg.style.color = "green";
                msg.innerText = "✅ ¡Contraseña cambiada con éxito! Entrando...";
                setTimeout(() => {
                    window.location.href = "vidriera.html";
                }, 1500);
            }
        }

        async function ejecutarAccion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('mensaje');

            if (!email || !password) {
                msg.style.color = "red";
                msg.innerText = "⚠️ Completá email y contraseña.";
                return;
            }

            msg.style.color = "blue";
            msg.innerText = "⏳ Procesando...";

            if (esRegistro) {
                const nombre = document.getElementById('nombre').value;
                const dni = document.getElementById('dni').value;
                const dir = document.getElementById('direccion').value;
                const tel = document.getElementById('telefono').value;
                const acepto = document.getElementById('acepto_terminos').checked;

                if (!nombre || !dni || !dir || !acepto) {
                    msg.style.color = "red";
                    msg.innerText = "⚠️ Completá todos los datos y aceptá los términos.";
                    return;
                }

                const { data, error } = await _supabase.auth.signUp({ 
                    email, 
                    password,
                    options: {
                        data: {
                            nombre_completo: nombre,
                            dni: dni,
                            direccion: dir,
                            telefono: tel
                        },
                        emailRedirectTo: 'https://lauraarrieta4-eng.github.io/quiendamas/login.html'
                    }
                });
                
                if (error) {
                    msg.style.color = "red";
                    msg.innerText = "❌ " + error.message;
                    return;
                }

                if (data.user) {
                    msg.style.color = "green";
                    msg.innerHTML = `
                        <div style="text-align: center; margin-top: 15px; padding: 12px; background-color: #e8f5e9; border-radius: 8px; border: 1px solid #c8e6c9;">
                            <span style="font-size: 2rem;">📩</span><br>
                            <b style="color: #2e7d32; font-size: 1.1em;">¡Cuenta creada con éxito!</b><br>
                            <p style="margin: 8px 0 0 0; color: #333; font-size: 0.95em;">Te enviamos un correo de confirmación.</p>
                        </div>
                    `;
                    // Limpieza básica
                    document.getElementById('email').value = "";
                    document.getElementById('password').value = "";
                }
            } else {
                // INICIO DE SESIÓN NORMAL
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                
                if (error) {
                    msg.style.color = "red";
                    msg.innerText = "❌ " + error.message;
                } else {
                    msg.style.color = "green";
                    msg.innerText = "✅ ¡Entrando...";
                    setTimeout(() => { window.location.href = "vidriera.html"; }, 1000);
                }
            }
        }
    </script>
</body>
</html>
