<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Quiéndamas - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f1f8e9; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { color: #2e7d32; text-align: center; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; color: #555; }
        .password-container { position: relative; width: 100%; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #4caf50; }
        .password-container input { padding-right: 40px; }
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-3px); cursor: pointer; font-size: 1.2rem; user-select: none; }
        button { background-color: #4caf50; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 1rem; }
        button:hover { background-color: #388e3c; }
        .toggle { text-align: center; margin-top: 15px; font-size: 0.9em; color: #4caf50; cursor: pointer; text-decoration: underline; }
        .recuperar-link { text-align: center; margin-top: 10px; font-size: 0.85em; color: #888; cursor: pointer; text-decoration: underline; display: block; }
        .terminos { margin-top: 15px; font-size: 0.8em; color: #666; }
        #mensaje { margin-top: 15px; text-align: center; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="titulo">Ingresar</h2>
        <div id="campos-comunes">
            <label>Email:</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com">
            <label>Contraseña:</label>
            <div class="password-container">
                <input type="password" id="password" placeholder="******">
                <span class="toggle-password" onclick="alternarPassword()">👁️</span>
            </div>
        </div>

        <div id="campos-registro" style="display:none;">
            <label>Nombre Completo:</label>
            <input type="text" id="nombre" placeholder="Nombre y apellido completo">
            <label>DNI:</label>
            <input type="text" id="dni" placeholder="Sin puntos ni espacios">
            <label>Dirección (para envíos):</label>
            <input type="text" id="direccion" placeholder="Calle, número, ciudad">
            <label>Teléfono:</label>
            <input type="text" id="telefono" placeholder="Ej: 2944123456">
            <div class="terminos">
                <input type="checkbox" id="acepto_terminos" style="width:auto;">
                Acepto los <a href="terminos.html" target="_blank">Términos y Condiciones</a>
            </div>
        </div>

        <button id="btn-principal" onclick="ejecutarAccion()">Entrar</button>
        <a id="link-recuperar" class="recuperar-link" onclick="recuperarContrasena()">¿Te olvidaste tu contraseña?</a>
        <div id="toggle-link" class="toggle" onclick="cambiarModo()">¿No tenés cuenta? Registrate aquí</div>
        <div id="mensaje"></div>
    </div>

    <script>
        let esRegistro = false;

        function cambiarModo() {
            esRegistro = !esRegistro;
            document.getElementById('titulo').innerText = esRegistro ? "Crear Cuenta" : "Ingresar";
            document.getElementById('btn-principal').innerText = esRegistro ? "Registrarse" : "Entrar";
            document.getElementById('campos-registro').style.display = esRegistro ? "block" : "none";
            document.getElementById('link-recuperar').style.display = esRegistro ? "none" : "block";
            document.getElementById('toggle-link').innerText = esRegistro ? "¿Ya tenés cuenta? Ingresá" : "¿No tenés cuenta? Registrate aquí";
            document.getElementById('mensaje').innerText = "";
        }

        function alternarPassword() {
            const input = document.getElementById('password');
            const ojo = document.querySelector('.toggle-password');
            if (input.type === "password") {
                input.type = "text";
                ojo.innerText = "🔒";
            } else {
                input.type = "password";
                ojo.innerText = "👁️";
            }
        }

        async function recuperarContrasena() {
            const email = document.getElementById('email').value;
            const msg = document.getElementById('mensaje');

            if (!email) {
                msg.style.color = "red";
                msg.innerText = "⚠️ Escribí tu email en el cuadro de arriba primero.";
                return;
            }

            msg.style.color = "blue";
            msg.innerText = "⏳ Enviando enlace...";

            const { data, error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://lauraarrieta4-eng.github.io/quiendamas/recuperar.html',
            });

            if (error) {
                msg.style.color = "red";
                msg.innerText = "❌ " + error.message;
            } else {
                msg.style.color = "green";
                msg.innerText = "✅ Te enviamos un enlace a tu correo. (Revisá SPAM)";
            }
        }

        async function ejecutarAccion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('mensaje');

            if (!email || !password) {
                msg.style.color = "red";
                msg.innerText = "⚠️ Completá email y contraseña.";
                return;
            }

            msg.style.color = "blue";
            msg.innerText = "⏳ Procesando...";

            if (esRegistro) {
                const nombre = document.getElementById('nombre').value;
                const dni = document.getElementById('dni').value;
                const dir = document.getElementById('direccion').value;
                const tel = document.getElementById('telefono').value;
                const acepto = document.getElementById('acepto_terminos').checked;

                if (!nombre || !dni || !dir || !tel || !acepto) {
                    msg.style.color = "red";
                    msg.innerText = "⚠️ Todos los campos son obligatorios y debés aceptar los términos.";
                    return;
                }

                const { data, error } = await _supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            nombre_completo: nombre,
                            dni: dni,
                            direccion: dir,
                            telefono: tel
                        }
                    }
                });

                if (data.user) { msg.style.color = "red"; msg.innerText = "❌ " + error.message; return; }

                if (!error) {
                    msg.style.color = "green";
                    msg.innerHTML = `<div style="padding:12px;background:#e8f5e9;border-radius:8px;border:1px solid #c8e6c9;text-align:center;"><span style="font-size:2rem;">📩</span><br><b style="color:#2e7d32;">¡Cuenta creada!</b><br><p style="margin:8px 0 0;color:#333;font-size:0.95em;">Revisá tu casilla y también el SPAM para confirmar tu cuenta.</p></div>`;
                    ['email','password','nombre','dni','direccion','telefono'].forEach(id => document.getElementById(id).value = "");
                    document.getElementById('acepto_terminos').checked = false;
                }

            } else {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

                if (error) { msg.style.color = "red"; msg.innerText = "❌ " + error.message; return; }

                // Crear perfil si no existe
                const { data: perfilExistente } = await _supabase
                    .from('perfiles').select('id').eq('id', data.user.id).maybeSingle();

                if (!perfilExistente) {
                    const meta = data.user.user_metadata;
                    await _supabase.from('perfiles').insert([{
                        id: data.user.id,
                        nombre_completo: meta.nombre_completo || "Usuario",
                        dni: meta.dni || "",
                        direccion: meta.direccion || "",
                        telefono: meta.telefono || ""
                    }]);
                }

                msg.style.color = "green";
                msg.innerText = "✅ ¡Entrando...";
                setTimeout(() => { window.location.href = "vidriera.html"; }, 1000);
            }
        }
    </script>
</body>
</html>
