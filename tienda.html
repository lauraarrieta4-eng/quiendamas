    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tienda - Quiéndamas</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --rosa: #2E7D32;
            --lila: #C8E6C9;
            --rosa-claro: #F1F8E9;
            --verde-lima: #A5D6A7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--rosa-claro); min-height: 100vh; }

        /* ── HEADER TIENDA ── */
        .tienda-header {
            background: #43a047;
            color: white;
            padding: 20px 16px 16px;
        }
        .tienda-header-top {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }
        .tienda-logo {
            width: 70px; height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            background: white;
        }
        .tienda-logo-placeholder {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 2em;
            border: 3px solid white;
        }
        .tienda-info-nombre { font-size: 1.3em; font-weight: 800; }
        .tienda-info-desc { font-size: 0.85em; opacity: 0.88; margin-top: 3px; }
        .tienda-chips {
            display: flex; flex-wrap: wrap; gap: 6px;
            margin-top: 10px;
        }
        .tienda-chip {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.78em;
            font-weight: 600;
        }
        .btn-volver {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.2);
            border: none; color: white;
            border-radius: 20px; padding: 6px 14px;
            font-size: 0.82em; cursor: pointer;
            margin-bottom: 10px;
            font-family: inherit;
        }
        .btn-volver:hover { background: rgba(255,255,255,0.3); }

        /* ── CARRITO FLOTANTE ── */
        .btn-carrito-flotante {
            position: fixed; bottom: 24px; right: 16px;
            background: #E04891; color: white;
            border: none; border-radius: 50px;
            padding: 14px 20px;
            font-size: 1em; font-weight: 700;
            cursor: pointer; z-index: 100;
            box-shadow: 0 4px 16px rgba(224,72,145,0.4);
            display: none;
            align-items: center; gap: 8px;
            transition: transform 0.15s;
        }
        .btn-carrito-flotante:active { transform: scale(0.96); }
        .badge-carrito {
            background: white; color: #E04891;
            border-radius: 50%; width: 22px; height: 22px;
            font-size: 0.78em; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── GRILLA PRODUCTOS ── */
        .tienda-body { padding: 12px; }
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        @media (min-width: 600px) {
            .productos-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 900px) {
            .productos-grid { grid-template-columns: repeat(5, 1fr); }
        }
        .prod-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
        }
        .prod-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            background: #f5f5f5;
        }
        .prod-img-placeholder {
            width: 100%;
            aspect-ratio: 1;
            background: #f5f5f5;
            display: flex; align-items: center; justify-content: center;
            font-size: 2em; color: #ccc;
        }
        .prod-body { padding: 5px 6px 6px; flex: 1; display: flex; flex-direction: column; }
        .prod-titulo { font-size: 0.75em; font-weight: 700; color: #222; margin-bottom: 2px; line-height: 1.2; }
        .prod-precio { font-size: 0.85em; font-weight: 800; color: #2e7d32; margin-bottom: 4px; }
        .prod-stock { font-size: 0.68em; color: #888; margin-bottom: 4px; }
        .btn-agregar {
            width: 100%; background: #43a047; color: white;
            border: none; border-radius: 6px;
            padding: 5px; font-size: 0.72em; font-weight: 700;
            cursor: pointer; margin-top: auto;
            transition: background 0.15s;
        }
        .btn-agregar:hover { background: #388e3c; }
        .btn-agregar:disabled { background: #bdbdbd; cursor: not-allowed; }
        .prod-sin-stock { font-size: 0.75em; color: #999; text-align: center; padding: 6px 0; }

        /* ── DRAWER CARRITO ── */
        .drawer-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 200;
        }
        .drawer-overlay.activo { display: block; }
        .drawer {
            position: fixed; right: 0; top: 0; bottom: 0;
            width: min(360px, 100vw);
            background: white;
            z-index: 201;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
        }
        .drawer.activo { transform: translateX(0); }
        .drawer-header {
            background: #43a047; color: white;
            padding: 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .drawer-header h2 { font-size: 1.05em; }
        .btn-cerrar-drawer {
            background: none; border: none; color: white;
            font-size: 1.4em; cursor: pointer; padding: 0 4px;
        }
        .drawer-items { flex: 1; overflow-y: auto; padding: 12px; }
        .carrito-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .carrito-item-img {
            width: 54px; height: 54px;
            object-fit: cover; border-radius: 8px;
            background: #f5f5f5; flex-shrink: 0;
        }
        .carrito-item-info { flex: 1; min-width: 0; }
        .carrito-item-titulo { font-size: 0.85em; font-weight: 600; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .carrito-item-precio { font-size: 0.82em; color: #2e7d32; font-weight: 700; }
        .carrito-item-controles { display: flex; align-items: center; gap: 6px; }
        .btn-cant { background: var(--lila); border: none; border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 1em; font-weight: 700; color: var(--rosa); }
        .cant-txt { font-size: 0.88em; font-weight: 700; min-width: 16px; text-align: center; }
        .drawer-footer { padding: 14px; border-top: 1px solid #eee; }
        .drawer-subtotal { display: flex; justify-content: space-between; font-size: 0.9em; color: #555; margin-bottom: 6px; }
        .drawer-delivery { display: flex; justify-content: space-between; font-size: 0.85em; color: #888; margin-bottom: 10px; }
        .drawer-total { display: flex; justify-content: space-between; font-size: 1.1em; font-weight: 800; color: #222; margin-bottom: 14px; }
        .btn-checkout {
            width: 100%; background: #009ee3; color: white;
            border: none; border-radius: 12px;
            padding: 14px; font-size: 1em; font-weight: 700;
            cursor: pointer;
        }
        .btn-checkout:hover { background: #0086c3; }
        .carrito-vacio { text-align: center; color: #aaa; padding: 40px 20px; font-size: 0.9em; }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        .empty-state div { font-size: 3em; margin-bottom: 12px; }

        /* ── MODAL DETALLE PRODUCTO ── */
        .modal-detalle { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: flex-end; justify-content: center; }
        .modal-detalle.activo { display: flex; }
        .modal-detalle-box { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 85vh; display: flex; flex-direction: column; }
        .modal-detalle-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 20px 20px 0 0; background: #f5f5f5; }
        .modal-detalle-img-placeholder { width: 100%; aspect-ratio: 4/3; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 3em; border-radius: 20px 20px 0 0; }
        .modal-detalle-body { padding: 18px; overflow-y: auto; flex: 1; }
        .modal-detalle-titulo { font-size: 1.1em; font-weight: 800; color: #222; margin-bottom: 4px; }
        .modal-detalle-precio { font-size: 1.2em; font-weight: 800; color: #2e7d32; margin-bottom: 12px; }
        .modal-detalle-desc { font-size: 0.88em; color: #555; line-height: 1.55; margin-bottom: 16px; white-space: pre-wrap; }
        .modal-detalle-btns { display: flex; flex-direction: column; gap: 8px; }
        .btn-detalle-carrito { background: #43a047; color: white; border: none; border-radius: 12px; padding: 13px; font-size: 0.95em; font-weight: 700; cursor: pointer; }
        .btn-detalle-pregunta { background: white; color: #43a047; border: 2px solid #43a047; border-radius: 12px; padding: 11px; font-size: 0.9em; font-weight: 700; cursor: pointer; text-decoration: none; display: block; text-align: center; }
        .btn-detalle-cerrar { background: none; border: none; color: #aaa; font-size: 0.85em; cursor: pointer; padding: 8px; text-align: center; width: 100%; }

        /* ── MODAL CHECKOUT ── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.activo { display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 24px 20px; max-width: 380px; width: 100%; border-top: 5px solid #009ee3; }
        .modal-box h2 { font-size: 1.1em; margin-bottom: 12px; color: #222; }
        .checkout-opcion { display: flex; align-items: center; gap: 10px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
        .checkout-opcion:hover { border-color: #43a047; }
        .checkout-opcion.seleccionada { border-color: #43a047; background: #f1f8e9; }
        .checkout-opcion-icon { font-size: 1.6em; }
        .checkout-opcion-titulo { font-size: 0.9em; font-weight: 700; }
        .checkout-opcion-desc { font-size: 0.78em; color: #777; }
        .btn-confirmar-checkout { width: 100%; background: #43a047; color: white; border: none; border-radius: 12px; padding: 14px; font-size: 1em; font-weight: 700; cursor: pointer; margin-top: 14px; }
        .btn-cancelar-checkout { width: 100%; background: none; border: none; color: #999; font-size: 0.85em; cursor: pointer; margin-top: 8px; padding: 6px; }
    </style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WHNJDJTG"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<!-- Header tienda -->
<div class="tienda-header">
    <button class="btn-volver" onclick="window.location.href='vidriera.html'">← Volver a la vidriera</button>
    <div class="tienda-header-top">
        <div id="tienda-logo-wrap"><div class="tienda-logo-placeholder">🏪</div></div>
        <div>
            <div class="tienda-info-nombre" id="tienda-nombre">Cargando...</div>
            <div class="tienda-info-desc" id="tienda-desc"></div>
        </div>
    </div>
    <div class="tienda-chips" id="tienda-chips"></div>
    <div id="tienda-reputacion" style="margin-top:10px;font-size:0.82em;color:rgba(255,255,255,0.9);"></div>
</div>

<!-- Grilla de productos -->
<div class="tienda-body">
    <div class="productos-grid" id="productos-grid">
        <div class="empty-state" style="grid-column:1/-1"><div>⏳</div>Cargando productos...</div>
    </div>
</div>

<!-- Botón carrito flotante -->
<button class="btn-carrito-flotante" id="btn-carrito-flotante" onclick="abrirDrawer()">
    🛒 Ver carrito
    <span class="badge-carrito" id="badge-carrito">0</span>
</button>

<!-- Drawer carrito -->
<div class="drawer-overlay" id="drawer-overlay" onclick="cerrarDrawer()"></div>
<div class="drawer" id="drawer-carrito">
    <div class="drawer-header">
        <h2>🛒 Tu carrito</h2>
        <button class="btn-cerrar-drawer" onclick="cerrarDrawer()">✕</button>
    </div>
    <div class="drawer-items" id="drawer-items"></div>
    <div class="drawer-footer" id="drawer-footer" style="display:none;">
        <div class="drawer-subtotal"><span>Subtotal</span><span id="drawer-subtotal-val"></span></div>
        <div class="drawer-delivery" id="drawer-delivery-row" style="display:none;"><span id="drawer-delivery-label">Delivery</span><span id="drawer-delivery-val"></span></div>
        <div class="drawer-total"><span>Total</span><span id="drawer-total-val"></span></div>
        <button class="btn-checkout" onclick="abrirCheckout()">💳 Ir al pago</button>
        <button onclick="vaciarCarrito()" style="width:100%;background:none;border:none;color:#e53935;font-size:0.82em;cursor:pointer;padding:6px;margin-top:4px;">🗑 Vaciar carrito</button>
    </div>
</div>

<!-- Modal detalle producto -->
<div class="modal-detalle" id="modal-detalle" onclick="cerrarDetalle(event)">
    <div class="modal-detalle-box" id="modal-detalle-box">
        <div id="modal-detalle-img-wrap"></div>
        <div class="modal-detalle-body">
            <div class="modal-detalle-titulo" id="modal-detalle-titulo"></div>
            <div class="modal-detalle-precio" id="modal-detalle-precio"></div>
            <div class="modal-detalle-desc" id="modal-detalle-desc"></div>
            <div class="modal-detalle-btns" id="modal-detalle-btns"></div>
            <button class="btn-detalle-cerrar" onclick="cerrarDetalle()">Cerrar</button>
        </div>
    </div>
</div>

<!-- Modal checkout -->
<div class="modal-overlay" id="modal-checkout">
    <div class="modal-box">
        <h2>¿Cómo querés recibir tu compra?</h2>
        <div class="checkout-opcion seleccionada" id="opcion-retiro" onclick="seleccionarEntrega('retiro')">
            <div class="checkout-opcion-icon">🏪</div>
            <div>
                <div class="checkout-opcion-titulo">Retiro en sucursal</div>
                <div class="checkout-opcion-desc" id="texto-retiro">Sin cargo</div>
            </div>
        </div>
        <div class="checkout-opcion" id="opcion-delivery" style="display:none;" onclick="seleccionarEntrega('delivery')">
            <div class="checkout-opcion-icon">🚚</div>
            <div>
                <div class="checkout-opcion-titulo">Delivery</div>
                <div class="checkout-opcion-desc" id="texto-delivery">Gratis</div>
            </div>
        </div>
        <button class="btn-confirmar-checkout" onclick="confirmarCheckout()">💳 Pagar online</button>
        <button class="btn-cancelar-checkout" onclick="cerrarCheckout()">Cancelar</button>
    </div>
</div>

<script>
    let _vendedorId = null;
    let _negocio = null;
    let _carrito = []; // [{art, cantidad}]
    let _entregaSeleccionada = 'retiro';
    let _usuarioId = null;

    // ── INIT ──────────────────────────────────────────────────────────
    (async () => {
        const params = new URLSearchParams(location.search);
        _vendedorId = params.get('id');
        if (!_vendedorId) { document.getElementById('tienda-nombre').innerText = 'Tienda no encontrada'; return; }

        const { data: { user } } = await _supabase.auth.getUser();
        _usuarioId = user?.id || null;

        await Promise.all([cargarNegocio(), cargarProductos()]);
    })();

    // ── NEGOCIO ───────────────────────────────────────────────────────
    async function cargarNegocio() {
        const { data: p } = await _supabase.from('perfiles')
            .select('nombre_comercio, descripcion_comercio, horario_atencion, tiempo_retiro, tiene_delivery, costo_delivery, avatar_url, ventas_count, verificado, ciudad')
            .eq('id', _vendedorId).maybeSingle();
        if (!p) return;
        _negocio = p;

        document.title = (p.nombre_comercio || 'Tienda') + ' - Quiéndamas';
        document.getElementById('tienda-nombre').innerText = p.nombre_comercio || 'Tienda';
        if (p.descripcion_comercio) document.getElementById('tienda-desc').innerText = p.descripcion_comercio;

        if (p.avatar_url) {
            document.getElementById('tienda-logo-wrap').innerHTML = `<img src="${p.avatar_url}" class="tienda-logo" alt="logo">`;
        }

        const chips = [];
        if (p.ciudad) chips.push('📍 ' + p.ciudad);
        if (p.horario_atencion) chips.push('🕐 ' + p.horario_atencion);
        if (p.tiempo_retiro) chips.push('⏳ Retiro: ' + p.tiempo_retiro);
        if (p.tiene_delivery) chips.push(p.costo_delivery > 0 ? `🚚 Delivery $${p.costo_delivery.toLocaleString('es-AR')}` : '🚚 Delivery gratis');
        document.getElementById('tienda-chips').innerHTML = chips.map(c => `<span class="tienda-chip">${c}</span>`).join('');

        cargarReputacion(p.ventas_count || 0);

        // Configurar opciones de checkout
        if (p.tiempo_retiro) document.getElementById('texto-retiro').innerText = 'Tiempo estimado: ' + p.tiempo_retiro;
        if (p.tiene_delivery) {
            document.getElementById('opcion-delivery').style.display = 'flex';
            document.getElementById('texto-delivery').innerText = p.costo_delivery > 0
                ? `Costo: $${p.costo_delivery.toLocaleString('es-AR')}`
                : 'Gratis';
        }
    }

    // ── MODAL DETALLE ─────────────────────────────────────────────────
    function abrirDetalle(articuloId) {
        const card = document.getElementById('prod-card-' + articuloId);
        const art = JSON.parse(card.dataset.art);

        const esSubasta = art.tipo_venta === 'subasta';
        const esStock = art.stock !== null && art.stock !== undefined;
        const sinStock = esStock && art.stock <= 0;
        const vendido = !esStock && !esSubasta && art.comprador_id;
        const noDisponible = sinStock || vendido;
        const precio = (art.precio_base || 0).toLocaleString('es-AR');

        const imgWrap = document.getElementById('modal-detalle-img-wrap');
        if (art.foto_url) {
            const esVideo = /\.(mp4|mov|webm|avi|mkv)(\?|$)/i.test(art.foto_url);
            imgWrap.innerHTML = esVideo
                ? `<video src="${art.foto_url}" class="modal-detalle-img" muted autoplay loop playsinline></video>`
                : `<img src="${art.foto_url}" class="modal-detalle-img">`;
        } else {
            imgWrap.innerHTML = `<div class="modal-detalle-img-placeholder">📷</div>`;
        }

        document.getElementById('modal-detalle-titulo').innerText = art.Titulo;
        document.getElementById('modal-detalle-precio').innerText = '$' + precio;
        document.getElementById('modal-detalle-desc').innerText = art.descripcion || 'Sin descripción.';

        let btns = '';
        if (esSubasta) {
            btns = `<a href="vidriera.html" class="btn-detalle-pregunta">🔨 Ver subasta en la vidriera</a>`;
        } else if (noDisponible) {
            btns = `<div style="text-align:center;color:#aaa;font-size:0.88em;">😕 No disponible</div>`;
        } else {
            btns = `<button class="btn-detalle-carrito" onclick="agregarAlCarrito('${art.id}'); cerrarDetalle()">🛒 Agregar al carrito</button>`;
        }
        btns += `<a href="vidriera.html" class="btn-detalle-pregunta">❓ Hacer una pregunta en la vidriera</a>`;
        document.getElementById('modal-detalle-btns').innerHTML = btns;

        document.getElementById('modal-detalle').classList.add('activo');
    }

    function cerrarDetalle(e) {
        if (e && document.getElementById('modal-detalle-box').contains(e.target)) return;
        document.getElementById('modal-detalle').classList.remove('activo');
    }

    // ── REPUTACIÓN ────────────────────────────────────────────────────
    async function cargarReputacion(ventasCount) {
        const { data: cals } = await _supabase
            .from('calificaciones')
            .select('puntaje')
            .eq('vendedor_id', _vendedorId);

        const el = document.getElementById('tienda-reputacion');
        const mazoFull  = `<img src="martillo.png" style="width:16px;height:16px;display:inline-block;vertical-align:middle;">`;
        const mazoEmpty = `<img src="martillo.png" style="width:16px;height:16px;display:inline-block;vertical-align:middle;opacity:0.25;filter:grayscale(1)">`;

        let partes = [];
        if (cals && cals.length > 0) {
            const promedio = (cals.reduce((s, c) => s + c.puntaje, 0) / cals.length);
            const n = Math.round(promedio);
            const martillos = mazoFull.repeat(n) + mazoEmpty.repeat(5 - n);
            partes.push(`${martillos} <span style="vertical-align:middle;">${promedio.toFixed(1)} (${cals.length} reseña${cals.length !== 1 ? 's' : ''})</span>`);
        } else {
            partes.push(`${mazoEmpty.repeat(5)} <span style="vertical-align:middle;">Sin calificaciones aún</span>`);
        }
        if (ventasCount > 0) {
            partes.push(`<span style="margin-left:10px;vertical-align:middle;">🛍️ ${ventasCount} venta${ventasCount !== 1 ? 's' : ''}</span>`);
        }
        el.innerHTML = partes.join('');
    }

    // ── PRODUCTOS ─────────────────────────────────────────────────────
    async function cargarProductos() {
        const { data: arts } = await _supabase.from('articulos')
            .select('*')
            .eq('perfil_id', _vendedorId)
            .eq('activo', true)
            .is('link_descarga', null)
            .is('comprador_id', null)
            .or('stock.is.null,stock.gt.0')
            .order('created_at', { ascending: false });

        const grid = document.getElementById('productos-grid');
        if (!arts?.length) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div>📦</div>Este comercio aún no tiene productos publicados.</div>';
            return;
        }

        grid.innerHTML = '';
        for (const art of arts) {
            const esSubasta = art.tipo_venta === 'subasta';
            const esInfoproducto = !!art.link_descarga;
            const esStock = !esInfoproducto && art.stock !== null && art.stock !== undefined;
            const sinStock = esStock && art.stock <= 0;
            const vendido = !esStock && !esInfoproducto && !esSubasta && art.comprador_id;
            const noDisponible = sinStock || vendido;

            const precio = (art.precio_base || 0).toLocaleString('es-AR');
            const esVideoUrl = /\.(mp4|mov|webm|avi|mkv|m4v)(\?|#|$)/i.test(art.foto_url || '');
            const imgHtml = art.foto_url
                ? esVideoUrl
                    ? `<video src="${art.foto_url}" class="prod-img" muted autoplay loop playsinline style="object-fit:contain;"></video>`
                    : `<img src="${art.foto_url}" class="prod-img" alt="${art.Titulo}" onerror="this.style.visibility='hidden'">`
                : `<div class="prod-img-placeholder">📷</div>`;

            const stockHtml = esStock
                ? `<div class="prod-stock">${art.stock > 0 ? `📦 ${art.stock} disponible${art.stock !== 1 ? 's' : ''}` : '📦 Sin stock'}</div>`
                : '';

            let btnHtml;
            if (esSubasta) {
                btnHtml = `<a href="vidriera.html" class="btn-agregar" style="background:#9c27b0;text-align:center;text-decoration:none;display:block;">🔨 Ver subasta en vidriera</a>`;
            } else if (esInfoproducto) {
                btnHtml = `<a href="vidriera.html" class="btn-agregar" style="background:#009ee3;text-align:center;text-decoration:none;display:block;">📥 Compralo en la vidriera</a>`;
            } else if (noDisponible) {
                btnHtml = `<div class="prod-sin-stock">😕 No disponible</div>`;
            } else {
                btnHtml = `<button class="btn-agregar" onclick="agregarAlCarrito('${art.id}')">🛒 Agregar al carrito</button>`;
            }

            const card = document.createElement('div');
            card.className = 'prod-card';
            card.id = 'prod-card-' + art.id;
            card.dataset.art = JSON.stringify(art);
            card.style.cursor = 'pointer';
            card.innerHTML = `
                <div onclick="abrirDetalle('${art.id}')" style="cursor:pointer;">
                    ${imgHtml}
                    <div class="prod-body">
                        <div class="prod-titulo">${art.Titulo}</div>
                        <div class="prod-precio">$${precio}</div>
                        ${stockHtml}
                    </div>
                </div>
                <div style="padding:0 10px 10px;">${btnHtml}</div>
            `;
            grid.appendChild(card);
        }
    }

    // ── CARRITO ───────────────────────────────────────────────────────
    function agregarAlCarrito(articuloId) {
        if (!_usuarioId) { alert('⚠️ Tenés que iniciar sesión para comprar.'); window.location.href = 'login.html'; return; }
        if (_usuarioId === _vendedorId) { alert('⚠️ No podés comprar en tu propia tienda.'); return; }

        const card = document.getElementById('prod-card-' + articuloId);
        const art = JSON.parse(card.dataset.art);

        const existente = _carrito.find(i => String(i.art.id) === String(articuloId));
        if (existente) {
            const maxCant = art.stock !== null ? art.stock : 99;
            if (existente.cantidad >= maxCant) { alert('No hay más stock disponible.'); return; }
            existente.cantidad++;
        } else {
            _carrito.push({ art, cantidad: 1 });
        }

        actualizarBtnCarrito();
        const btn = card.querySelector('.btn-agregar');
        if (btn) { btn.innerText = '✅ Agregado'; setTimeout(() => { btn.innerText = '🛒 Agregar al carrito'; }, 800); }
    }

    function quitarItem(articuloId) {
        const idx = _carrito.findIndex(i => i.art.id === articuloId);
        if (idx === -1) return;
        if (_carrito[idx].cantidad > 1) {
            _carrito[idx].cantidad--;
        } else {
            _carrito.splice(idx, 1);
        }
        actualizarBtnCarrito();
        renderDrawer();
    }

    function eliminarItem(articuloId) {
        _carrito = _carrito.filter(i => i.art.id !== articuloId);
        actualizarBtnCarrito();
        renderDrawer();
    }

    window._cartAccion = function(accion, id) {
        const sid = String(id);
        if (accion === 'quitar') {
            const idx = _carrito.findIndex(i => String(i.art.id) === sid);
            if (idx === -1) return;
            if (_carrito[idx].cantidad > 1) { _carrito[idx].cantidad--; }
            else { _carrito.splice(idx, 1); }
        } else if (accion === 'sumar') {
            const item = _carrito.find(i => String(i.art.id) === sid);
            if (!item) return;
            const max = item.art.stock !== null ? item.art.stock : 99;
            if (item.cantidad < max) item.cantidad++;
        } else if (accion === 'eliminar') {
            _carrito = _carrito.filter(i => String(i.art.id) !== sid);
        }
        actualizarBtnCarrito();
        renderDrawer();
    };

    function vaciarCarrito() {
        if (!confirm('¿Vaciar el carrito?')) return;
        _carrito = [];
        actualizarBtnCarrito();
        renderDrawer();
    }

    function sumarItem(articuloId) {
        const item = _carrito.find(i => i.art.id === articuloId);
        if (!item) return;
        const maxCant = item.art.stock !== null ? item.art.stock : 99;
        if (item.cantidad >= maxCant) return;
        item.cantidad++;
        actualizarBtnCarrito();
        renderDrawer();
    }

    function actualizarBtnCarrito() {
        const total = _carrito.reduce((s, i) => s + i.cantidad, 0);
        const btn = document.getElementById('btn-carrito-flotante');
        const badge = document.getElementById('badge-carrito');
        btn.style.display = total > 0 ? 'flex' : 'none';
        badge.innerText = total;
    }

    function subtotalCarrito() {
        return _carrito.reduce((s, i) => s + (i.art.precio_base || 0) * i.cantidad, 0);
    }

    function costoDelivery() {
        if (_entregaSeleccionada !== 'delivery' || !_negocio?.tiene_delivery) return 0;
        return _negocio.costo_delivery || 0;
    }

    // ── DRAWER ────────────────────────────────────────────────────────
    function abrirDrawer() {
        renderDrawer();
        document.getElementById('drawer-overlay').classList.add('activo');
        document.getElementById('drawer-carrito').classList.add('activo');
    }

    function cerrarDrawer() {
        document.getElementById('drawer-overlay').classList.remove('activo');
        document.getElementById('drawer-carrito').classList.remove('activo');
    }

    function renderDrawer() {
        const cont = document.getElementById('drawer-items');
        const footer = document.getElementById('drawer-footer');

        if (!_carrito.length) {
            cont.innerHTML = '<div class="carrito-vacio">🛒 Tu carrito está vacío</div>';
            footer.style.display = 'none';
            return;
        }

        cont.innerHTML = _carrito.map(item => {
            const precio = (item.art.precio_base || 0).toLocaleString('es-AR');
            const img = item.art.foto_url
                ? `<img src="${item.art.foto_url}" class="carrito-item-img">`
                : `<div class="carrito-item-img" style="display:flex;align-items:center;justify-content:center;font-size:1.5em;">📷</div>`;
            return `
                <div class="carrito-item" data-id="${item.art.id}">
                    ${img}
                    <div class="carrito-item-info">
                        <div class="carrito-item-titulo">${item.art.Titulo}</div>
                        <div class="carrito-item-precio">$${precio} c/u</div>
                    </div>
                    <div class="carrito-item-controles">
                        <button class="btn-cant" onclick="window._cartAccion('quitar','${item.art.id}')">−</button>
                        <span class="cant-txt">${item.cantidad}</span>
                        <button class="btn-cant" onclick="window._cartAccion('sumar','${item.art.id}')">+</button>
                        <button class="btn-cant" onclick="window._cartAccion('eliminar','${item.art.id}')" style="margin-left:4px;color:#e53935;border-color:#e53935;font-size:0.9em;">✕</button>
                    </div>
                </div>`;
        }).join('');


        const subtotal = subtotalCarrito();
        const delivery = costoDelivery();
        const total = subtotal + delivery;

        document.getElementById('drawer-subtotal-val').innerText = '$' + subtotal.toLocaleString('es-AR');

        const deliveryRow = document.getElementById('drawer-delivery-row');
        if (_entregaSeleccionada === 'delivery' && _negocio?.tiene_delivery) {
            deliveryRow.style.display = 'flex';
            document.getElementById('drawer-delivery-label').innerText = '🚚 Delivery';
            document.getElementById('drawer-delivery-val').innerText = delivery > 0 ? '$' + delivery.toLocaleString('es-AR') : 'Gratis';
        } else {
            deliveryRow.style.display = 'none';
        }

        document.getElementById('drawer-total-val').innerText = '$' + total.toLocaleString('es-AR');
        footer.style.display = 'block';
    }

    // ── CHECKOUT ──────────────────────────────────────────────────────
    function abrirCheckout() {
        cerrarDrawer();
        document.getElementById('modal-checkout').classList.add('activo');
    }

    function cerrarCheckout() {
        document.getElementById('modal-checkout').classList.remove('activo');
    }

    function seleccionarEntrega(tipo) {
        _entregaSeleccionada = tipo;
        document.getElementById('opcion-retiro').classList.toggle('seleccionada', tipo === 'retiro');
        document.getElementById('opcion-delivery').classList.toggle('seleccionada', tipo === 'delivery');
    }

    async function confirmarCheckout() {
        if (!_usuarioId) { alert('⚠️ Tenés que iniciar sesión para pagar.'); window.location.href = 'login.html'; return; }
        if (!_carrito.length) return;

        const btn = document.querySelector('.btn-confirmar-checkout');
        btn.disabled = true; btn.innerText = '⏳ Procesando...';

        try {
            const subtotal = subtotalCarrito();
            const delivery = costoDelivery();
            const total = subtotal + delivery;

            const { data: { session } } = await _supabase.auth.getSession();
            const titulosCarrito = _carrito.map(i => `${i.cantidad}x ${i.art.Titulo}`).join(', ');
            const checkoutId = crypto.randomUUID();

            // Guardar checkout_id en carrito
            for (const item of _carrito) {
                await _supabase.from('carrito').insert([{
                    usuario_id: _usuarioId,
                    vendedor_id: _vendedorId,
                    articulo_id: item.art.id,
                    cantidad: item.cantidad,
                    checkout_id: checkoutId,
                    precio_unitario: item.art.precio_base || 0,
                    art_titulo: item.art.Titulo,
                    tipo_entrega: _entregaSeleccionada,
                }]);
            }

            const res = await fetch('https://bzznyvzzwfqqxqddjqwh.supabase.co/functions/v1/mp-carrito', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                body: JSON.stringify({ checkout_id: checkoutId, costo_delivery: delivery }),
            });
            const data = await res.json();
            if (data.init_point) {
                window.location.href = data.init_point;
            } else {
                throw new Error(data.error || 'No se pudo crear el pago');
            }
        } catch (err) {
            alert('❌ Error al procesar el pago: ' + err.message);
            btn.disabled = false; btn.innerText = '💳 Pagar online';
        }
    }
</script>
