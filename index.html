<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiéndamas</title>
    <meta http-equiv="refresh" content="0; url=vidriera.html">
    <script>
        const esCallbackAuth = window.location.hash.includes('access_token=') || window.location.hash.includes('type=recovery') || window.location.search.includes('type=recovery');
        const destino = esCallbackAuth
            ? 'login.html' + window.location.search + window.location.hash
            : 'vidriera.html';
        window.location.replace(destino);
    </script>
</head>
<body>
    <p>Entrando a Quiéndamas...</p>
    <p><a href="vidriera.html">Ir a la vidriera</a></p>
</body>
</html>
